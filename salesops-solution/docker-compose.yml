services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-zbrain}:${POSTGRES_PASSWORD:-zbrain}@postgres:5432/${POSTGRES_DB:-zbrain}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/backend/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zbrain}
      POSTGRES_DB: ${POSTGRES_DB:-zbrain}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zbrain} -d ${POSTGRES_DB:-zbrain}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pg_data:
